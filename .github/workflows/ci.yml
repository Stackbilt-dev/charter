name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run supply-chain:check
      - run: pnpm run build
      - name: Measure brief token budget
        run: node scripts/measure-brief-size.mjs
      - name: Eval brief orientation coverage
        run: node scripts/eval-brief-coverage.mjs
      - run: pnpm run typecheck
      - name: Docs sync check
        run: pnpm run docs:check
        if: hashFiles('.docsync.json') != ''
      - run: pnpm run verify:adf
      - run: pnpm run test
      - run: node packages/cli/dist/bin.js --help

